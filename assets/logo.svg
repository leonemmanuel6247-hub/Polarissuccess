<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="orbeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#70E2FF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbeCore" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#70E2FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </radialGradient>
    <linearGradient id="anneau1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="anneau2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#70E2FF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="anneau3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#70E2FF" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fond noir -->
  <rect width="1024" height="1024" fill="#000000" rx="80"/>

  <!-- Étoiles -->
  <g fill="#FFFFFF">
    <circle cx="120" cy="180" r="1.5" opacity="0.4"/>
    <circle cx="850" cy="120" r="1" opacity="0.6"/>
    <circle cx="900" cy="350" r="2" opacity="0.3"/>
    <circle cx="150" cy="450" r="1.2" opacity="0.7"/>
    <circle cx="780" cy="600" r="1.5" opacity="0.5"/>
    <circle cx="200" cy="700" r="1" opacity="0.4"/>
    <circle cx="880" cy="780" r="1.8" opacity="0.6"/>
    <circle cx="300" cy="100" r="1" opacity="0.3"/>
    <circle cx="700" cy="200" r="1.5" opacity="0.5"/>
    <circle cx="50" cy="350" r="1.2" opacity="0.6"/>
    <circle cx="950" cy="500" r="1" opacity="0.4"/>
    <circle cx="100" cy="850" r="1.5" opacity="0.5"/>
    <circle cx="400" cy="80" r="1" opacity="0.3"/>
    <circle cx="620" cy="900" r="1.8" opacity="0.6"/>
    <circle cx="920" cy="920" r="1" opacity="0.4"/>
    <circle cx="300" cy="900" r="1.5" opacity="0.5"/>
    <circle cx="500" cy="150" r="1" opacity="0.3"/>
    <circle cx="750" cy="450" r="1.2" opacity="0.7"/>
    <circle cx="250" cy="550" r="1" opacity="0.4"/>
    <circle cx="800" cy="350" r="1.5" opacity="0.6"/>
  </g>

  <!-- Halo externe de l'orbe -->
  <circle cx="512" cy="400" r="180" fill="url(#orbeGlow)" filter="url(#bigGlow)" opacity="0.6"/>

  <!-- Anneau 3 - Externe -->
  <ellipse cx="512" cy="400" rx="280" ry="100" fill="none" stroke="url(#anneau3)" stroke-width="2" transform="rotate(-15 512 400)" opacity="0.5"/>

  <!-- Anneau 2 - Médian -->
  <ellipse cx="512" cy="400" rx="220" ry="78" fill="none" stroke="url(#anneau2)" stroke-width="3" transform="rotate(25 512 400)" opacity="0.7"/>

  <!-- Satellite sur anneau 2 -->
  <circle cx="700" cy="350" r="8" fill="#70E2FF" filter="url(#glow)"/>
  <circle cx="700" cy="350" r="16" fill="#70E2FF" opacity="0.3"/>

  <!-- Anneau 1 - Interne -->
  <ellipse cx="512" cy="400" rx="160" ry="56" fill="none" stroke="url(#anneau1)" stroke-width="4" transform="rotate(-35 512 400)" opacity="0.9"/>

  <!-- Orbe central -->
  <circle cx="512" cy="400" r="60" fill="url(#orbeCore)" filter="url(#glow)"/>
  <circle cx="490" cy="380" r="20" fill="#FFFFFF" opacity="0.6"/>

  <!-- Texte SUCCESS POLARIS -->
  <text x="512" y="850" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="72" fill="#00D4FF" letter-spacing="8" filter="url(#glow)">SUCCESS POLARIS</text>

  <!-- Ligne décorative -->
  <line x1="360" y1="820" x2="664" y2="820" stroke="#00D4FF" stroke-width="2" opacity="0.4"/>
  <line x1="410" y1="880" x2="614" y2="880" stroke="#70E2FF" stroke-width="1" opacity="0.3"/>
</svg>
